<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Hack From Scratch{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/default.css') }}" />
  {% block extra_css %}{% endblock %}
</head>
<body>
  <!-- Page Transition Overlay -->
  <div class="page-transition"></div>

  {% block content %}{% endblock %}

  <script>
    function handlePageTransition(href) {
      const transition = document.querySelector('.page-transition');
      transition.classList.remove('end');
      transition.classList.add('start');
      
      setTimeout(() => {
        window.location.href = href;
      }, 500);
    }

    document.addEventListener('DOMContentLoaded', function() {
      // Animate in on page load
      const transition = document.querySelector('.page-transition');
      if (transition) {
        setTimeout(() => {
          transition.classList.add('end');
        }, 50);
      }

      // Intercept all internal links
      document.querySelectorAll('a').forEach(link => {
        if (!link.href.startsWith('http') || link.href.includes(window.location.hostname)) {
          link.addEventListener('click', function(e) {
            if (!this.href.includes('#')) {
              e.preventDefault();
              handlePageTransition(this.href);
            }
          });
        }
      });
    });
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
