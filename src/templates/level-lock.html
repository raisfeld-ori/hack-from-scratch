<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hack From Scratch</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/default.css') }}"
    />
  </head>
  <body>
    <div class="container">
      <h1 class="title">Flag required</h1>
      <p>Give the flag of the last level to proceed.</p>
      {% if error %}
      <p style="color: red">{{ error }}</p>
      {% endif %}
      <form
        method="POST"
        action="{{ url_for('level-' + level_num|string + '.submit') }}"
      >
        <input type="text" name="flag" placeholder="Flag" required />
        <button type="submit">Submit</button>
      </form>
    </div>
  </body>
</html>
