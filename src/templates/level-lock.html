<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hack From Scratch</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/default.css') }}"
    />
  </head>
  <body>
    <!-- Page Transition Overlay -->
    <div class="page-transition"></div>

    <div class="container">
      <h1 class="title">Flag required</h1>
      <p>Give the flag of the last level to proceed.</p>
      {% if error %}
      <p style="color: red">{{ error }}</p>
      {% endif %}
      <form
        method="POST"
        action="{{ url_for('level-' + level_num|string + '.submit') }}"
      >
        <input type="text" name="flag" placeholder="Flag" required />
        <button type="submit">Submit</button>
      </form>
    </div>

    <script>
      function handlePageTransition(href) {
        const transition = document.querySelector('.page-transition');
        transition.classList.remove('end');
        transition.classList.add('start');
        
        setTimeout(() => {
          window.location.href = href;
        }, 500);
      }

      document.addEventListener('DOMContentLoaded', function() {
        const transition = document.querySelector('.page-transition');
        if (transition) {
          setTimeout(() => {
            transition.classList.add('end');
          }, 50);
        }

        document.querySelectorAll('a').forEach(link => {
          if (!link.href.startsWith('http') || link.href.includes(window.location.hostname)) {
            link.addEventListener('click', function(e) {
              if (!this.href.includes('#')) {
                e.preventDefault();
                handlePageTransition(this.href);
              }
            });
          }
        });
      });
    </script>
  </body>
</html>
